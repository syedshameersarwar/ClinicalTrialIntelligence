services:
  redpanda:
    image: redpandadata/redpanda:v25.3.9
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
    command: jobmanager
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/opt/jobs

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
    command: taskmanager
    depends_on:
      - jobmanager

  kestra:
    build:
      context: .
      dockerfile: Dockerfile.kestra
    user: "root"
    command: server standalone
    env_file:
      - ../kestra.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra-data:/app/storage
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ..:/workspace
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/benchmark
            driverClassName: org.postgresql.Driver
            username: postgres
            password: postgres
        flyway:
          datasources:
            postgres:
              baseline-on-migrate: true
        kestra:
          variables:
            env-vars-prefix: ""
          server:
            basicAuth:
              username: admin@benchmark.io
              password: Admin1234!
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  kestra-data:
